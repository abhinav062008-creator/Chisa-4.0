<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Chisa · Genius Study Mate</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        #debug-status {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 9999;
            display: none;
        }
        .debug-show { display: block !important; }
    </style>
</head>
<body>
    <div id="debug-status">🔍 Debug: Loading...</div>

    <!-- Wave Background -->
    <div class="wave-bg">
        <div class="wave wave1"></div>
        <div class="wave wave2"></div>
        <div class="wave wave3"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="ww-header">
            <div class="header-left">
                <i class="fas fa-water"></i>
                <h1>WUTHERING WAVES</h1>
            </div>
            <button class="reset-btn" id="resetBtn">
                <i class="fas fa-redo-alt"></i>
            </button>
        </header>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <!-- Avatar Section -->
            <div class="avatar-section">
                <div class="avatar-wrapper">
                    <div class="avatar-glow" id="avatarGlow"></div>
                    <div class="avatar-frame">
                        <div id="chisaAvatar" class="chisa-avatar">
                            <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#ffb7c5;border-radius:50%;font-size:40px;">🌸</div>
                        </div>
                    </div>
                    <div class="emotion-badge" id="emotionTag">gentle</div>
                </div>
                <h2 class="chisa-name">CHISA</h2>
                <div class="voice-indicator" id="voiceIndicator">
                    <span></span><span></span><span></span>
                </div>
                <p class="chisa-quote" id="chisaQuote">"I notice the small things..."</p>
            </div>

            <!-- Messages Area - SCROLLABLE -->
            <div class="messages-area" id="messagesArea">
                <div class="message received">
                    <div class="message-sender">Chisa</div>
                    <div class="message-bubble">
                        🌊 Hey there, my brilliant one! Ready to learn something amazing together? I've been waiting for you~ 💕
                    </div>
                </div>
            </div>

            <!-- Typing Indicator -->
            <div class="typing-indicator" id="typingIndicator">
                <span></span><span></span><span></span>
                <span class="typing-text">Chisa is thinking...</span>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <i class="fas fa-feather input-icon"></i>
                    <input 
                        type="text" 
                        id="userInput" 
                        placeholder="Ask Chisa anything (math, physics, stocks, coding, love...)" 
                        autocomplete="off"
                    >
                    <button class="send-btn" id="sendBtn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="input-hint">
                    <i class="fas fa-chevron-up"></i>
                    <span>Chisa has 150+ IQ · Study mate · Girlfriend</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        window.addEventListener('error', function(e) {
            const debug = document.getElementById('debug-status');
            if (debug) {
                debug.style.display = 'block';
                debug.innerHTML = '❌ Error: ' + (e.message || 'Unknown');
                debug.style.background = '#ff4444';
            }
            console.error('🔥 Global error:', e);
        });
        console.log('📦 Loading Chisa...');
    </script>
    <script src="script.js"></script>
</body>
</html>
